<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Rutas a puntos de reciclaje</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        height: 100vh;
        display: flex;
      }

      #sidebar {
        width: 320px;
        padding: 16px;
        border-right: 1px solid #ddd;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      #sidebar h1 {
        font-size: 1.5rem;
        margin: 0 0 8px;
      }

      label {
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 4px;
        display: block;
      }

      select,
      button {
        width: 100%;
        padding: 6px 8px;
        font-size: 0.9rem;
      }

      button {
        cursor: pointer;
        border-radius: 4px;
        border: 1px solid #333;
        background: #333;
        color: #fff;
      }

      button:disabled {
        opacity: 0.6;
        cursor: default;
      }

      #estado {
        font-size: 0.85rem;
        color: #555;
        min-height: 1.2em;
      }

      #rutaResumen {
        font-size: 0.9rem;
        margin-top: 4px;
      }

      #callesBox {
        flex: 1;
        overflow-y: auto;
        border-top: 1px solid #ddd;
        margin-top: 8px;
        padding-top: 8px;
      }

      #callesList {
        padding-left: 18px;
        margin: 4px 0 0;
        font-size: 0.85rem;
      }

      #map {
        flex: 1;
      }
    </style>
  </head>
  <body>
    <div id="sidebar">
      <h1>Rutas a puntos de reciclaje</h1>

      <div>
        <button id="btnUbicacion">Usar mi ubicación</button>
        <div id="estado"></div>
      </div>

      <div>
        <label for="recyclingSelect">Punto de reciclaje</label>
        <select id="recyclingSelect" disabled>
          <option value="">Primero usa tu ubicación</option>
        </select>
      </div>

      <div id="rutaResumen">
        Selecciona un punto de reciclaje para ver la ruta.
      </div>

      <div id="callesBox">
        <strong>Calles de la ruta:</strong>
        <ul id="callesList"></ul>
      </div>
    </div>

    <div id="map"></div>

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script src="app.js"></script>
  </body>
</html>
